name: zynksec

# Phase 0 Week 3: adds zap (default) on zynksec-scan + zynksec-targets.
# juice-shop lives in target-lab/compose-targets.yml so targets are
# opt-in via `-f target-lab/compose-targets.yml --profile lab`.
# Phase 0 Week 4: adds glitchtip (4 services) behind the `obs` profile
# so daily dev isn't paying ~1.4 GiB of RAM for error-tracking infra
# you only look at when something breaks.  All three network zones are
# declared here (docs/04 §0.6).
#
# Phase 2 Sprint 3 introduces multi-instance ZAP fan-out: ``zap1`` +
# ``zap2`` share an identical config via the YAML anchor below, and
# matching ``worker1`` / ``worker2`` services each pin to one ZAP and
# subscribe to one Celery queue (``zap_q_1`` / ``zap_q_2``).  Worker
# concurrency stays at 1 per worker — the single-instance-ZAP contract
# holds within each worker/zap pair; parallelism comes from running
# two pairs.  ``ZAP_INSTANCE_COUNT`` (default 2, in ``.env.example``)
# is the source of truth for "how many pairs"; the API uses it to
# round-robin children across queues.

# ---------- shared ZAP service config ----------
# zap1 + zap2 are identical except for container_name; the anchor
# below is YAML's standard way to keep them in lock-step.  ``-Xmx3500m``
# in ``command`` is the ONLY mechanism that overrides ``zap.sh``'s
# hardcoded ``-Xmx1959m`` (Phase 1 Sprint 3 investigation —
# ``_JAVA_OPTIONS`` is ignored by the launcher).
x-zap-base: &zap_base
  image: zaproxy/zap-stable:latest
  restart: unless-stopped
  env_file:
    - .env
  # 6 GiB cgroup with -Xmx3500m sits at ~57% — leaves ~2.5 GiB for
  # non-heap (metaspace + JIT cache + thread stacks + session-DB
  # page cache).  See docs/architecture/zap-resource-tuning.md.
  mem_limit: 6g
  memswap_limit: 6g
  command:
    - zap.sh
    - -Xmx3500m
    - -daemon
    - -host
    - 0.0.0.0
    - -port
    - "8090"
    - -config
    - api.addrs.addr.name=.*
    - -config
    - api.addrs.addr.regex=true
    - -config
    - api.key=${ZAP_API_KEY}
  networks:
    - zynksec-scan
    - zynksec-targets
  healthcheck:
    test:
      - CMD-SHELL
      - 'curl -fsS "http://localhost:8090/JSON/core/view/version/?apikey=$$ZAP_API_KEY" >/dev/null'
    interval: 5s
    timeout: 3s
    retries: 20
    start_period: 60s

# ---------- shared worker service config ----------
# worker1 + worker2 share image + dependencies + networks; each
# differs ONLY in WORKER_ZAP_INDEX, ZAP_API_URL, and the Celery
# queue it subscribes to.  Each worker keeps ``--concurrency=1`` so
# the single-instance-ZAP contract is preserved per pair.
x-worker-base: &worker_base
  build:
    context: .
    dockerfile: infra/docker/worker.Dockerfile
  image: zynksec/worker:dev
  restart: unless-stopped
  env_file:
    - .env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - zynksec-core
    - zynksec-scan

services:
  postgres:
    image: postgres:16-alpine
    container_name: zynksec-postgres
    restart: unless-stopped
    env_file:
      - .env
    # Postgres is intentionally NOT published to the host — only the
    # api container needs it, and keeping it off the host port namespace
    # (a) closes a minor attack surface (CLAUDE.md §17) and (b) avoids
    # colliding with any locally-installed psql.  Uncomment a mapping
    # in docker-compose.override.yml if you want `psql` from the host.
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/compose/postgres-init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    networks:
      - zynksec-core
    healthcheck:
      # `$$` escapes the compose interpolation so the shell inside the
      # container sees the env vars set by env_file.
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: zynksec-redis
    restart: unless-stopped
    # Redis is intentionally NOT published to the host for the same
    # reasoning as postgres above (CLAUDE.md §17).  The api + future
    # worker reach it over the zynksec-core docker network.
    networks:
      - zynksec-core
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    image: zynksec/api:dev
    container_name: zynksec-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - zynksec-core
    # /ready is the honest orchestrator signal: 200 only when Postgres
    # + Redis are both reachable; 503 otherwise.  /health (liveness) is
    # reserved for "is this process alive?" checks.  Python urllib
    # because curl is not in the slim Python base image.
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import sys,urllib.request;r=urllib.request.urlopen('http://localhost:8000/api/v1/ready',timeout=3);sys.exit(0 if r.status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # ---------- ZAP fan-out: zap1 + zap2 ----------
  # Two identical ZAP instances sharing &zap_base.  Each pairs 1:1 with
  # a worker (worker1 ↔ zap1, worker2 ↔ zap2) so the single-instance
  # ZAP contract — one in-flight scan per ZAP daemon — is preserved
  # within each pair.  Parallelism comes from running both pairs.
  #
  # ``ZAP_INSTANCE_COUNT`` in .env is the source of truth for how many
  # pairs exist; the API uses it to round-robin children across queues.
  # Adding a third pair is a 4-block edit here (zap3 + worker3) plus
  # bumping the env var — no code changes anywhere else.
  #
  # Memory sizing background lives in
  # docs/architecture/zap-resource-tuning.md and the &zap_base comment
  # block above.  Two ZAPs at 6 GiB each = 12 GiB total cgroup ceiling;
  # Docker Desktop default VM is 8 GiB so devs running multi-instance
  # locally need to bump VM memory to ≥14 GiB (see README §dev-setup).
  zap1:
    <<: *zap_base
    container_name: zynksec-zap1

  zap2:
    <<: *zap_base
    container_name: zynksec-zap2

  # ---------- Worker fan-out: worker1 + worker2 ----------
  # Each worker subscribes to exactly ONE Celery queue (``zap_q_{i}``)
  # and points at exactly ONE ZAP daemon (``zap{i}:8090``).  The Celery
  # ``--concurrency=1`` default is preserved (no override) so a worker
  # never tries to drive its paired ZAP with two scans at once —
  # CLAUDE.md §3 single-responsibility / single-instance-ZAP contract.
  #
  # Worker bridges core (broker + Postgres) and scan (ZAP).  It MUST
  # NOT touch zynksec-targets directly — docs/04 §0.6 + CLAUDE.md §5.
  # Verify isolation:
  #   docker compose exec worker1 getent hosts juice-shop
  # should return no output (worker shares no network with juice-shop).
  worker1:
    <<: *worker_base
    container_name: zynksec-worker1
    environment:
      WORKER_ZAP_INDEX: "1"
      ZAP_API_URL: "http://zap1:8090"
    command:
      - celery
      - -A
      - zynksec_worker.celery_app
      - worker
      - --loglevel=INFO
      - --queues=zap_q_1

  worker2:
    <<: *worker_base
    container_name: zynksec-worker2
    environment:
      WORKER_ZAP_INDEX: "2"
      ZAP_API_URL: "http://zap2:8090"
    command:
      - celery
      - -A
      - zynksec_worker.celery_app
      - worker
      - --loglevel=INFO
      - --queues=zap_q_2

  mailpit:
    image: axllent/mailpit:latest
    container_name: zynksec-mailpit
    restart: unless-stopped
    profiles:
      - dev
    # Host-published because the Mailpit UI is useful to a human
    # developer.  Phase 0 sends no mail yet (docs/04 §0.15); the
    # service is here so the first feature that needs email in Phase
    # 2 finds SMTP already wired.
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    networks:
      - zynksec-core

  # ---------- GlitchTip observability stack (opt-in: --profile obs) ----
  # GlitchTip is Sentry-compatible, AGPLv3, self-hosted error tracking.
  # It gets its OWN postgres + redis so "the thing that captures our
  # errors" doesn't fail when the system it's watching fails.  All four
  # services live on zynksec-core ONLY — GlitchTip must never reach
  # zynksec-scan or zynksec-targets.
  #
  # Opt-in because the four-container stack costs ~1.4 GiB of RAM and
  # a developer who is just running ``uv run pytest`` every few minutes
  # does not need error tracking running continuously.  Activate with:
  #   docker compose --profile lab --profile obs up -d --build
  # Sentry SDK no-ops when SENTRY_DSN is empty (Week-4 commit 4), so
  # api + worker boot identically whether `obs` is active or not.

  glitchtip-postgres:
    image: postgres:16-alpine
    container_name: zynksec-glitchtip-postgres
    restart: unless-stopped
    profiles:
      - obs
    environment:
      POSTGRES_USER: ${GLITCHTIP_POSTGRES_USER:-glitchtip}
      POSTGRES_PASSWORD: ${GLITCHTIP_POSTGRES_PASSWORD:-changeme-local-only}
      POSTGRES_DB: ${GLITCHTIP_POSTGRES_DB:-glitchtip}
    volumes:
      - glitchtip-pg-data:/var/lib/postgresql/data
    networks:
      - zynksec-core
    mem_limit: 256m
    memswap_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10

  glitchtip-redis:
    image: redis:7-alpine
    container_name: zynksec-glitchtip-redis
    restart: unless-stopped
    profiles:
      - obs
    networks:
      - zynksec-core
    mem_limit: 128m
    memswap_limit: 128m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  glitchtip-web:
    image: glitchtip/glitchtip:latest
    container_name: zynksec-glitchtip-web
    restart: unless-stopped
    profiles:
      - obs
    depends_on:
      glitchtip-postgres:
        condition: service_healthy
      glitchtip-redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${GLITCHTIP_POSTGRES_USER:-glitchtip}:${GLITCHTIP_POSTGRES_PASSWORD:-changeme-local-only}@glitchtip-postgres:5432/${GLITCHTIP_POSTGRES_DB:-glitchtip}
      REDIS_URL: redis://glitchtip-redis:6379/0
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-please-generate-a-32-byte-base64-value}
      PORT: "8000"
      EMAIL_URL: consolemail://
      GLITCHTIP_DOMAIN: http://localhost:8001
      DEFAULT_FROM_EMAIL: glitchtip@localhost
      CELERY_WORKER_CONCURRENCY: "1"
    ports:
      # Host 8001 so we don't collide with the zynksec api on host 8000.
      - "8001:8000"
    networks:
      - zynksec-core
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck:
      # GlitchTip image is Python-based; urllib is always present.
      test:
        - CMD
        - python
        - -c
        - "import urllib.request;urllib.request.urlopen('http://localhost:8000/_health/',timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  glitchtip-worker:
    image: glitchtip/glitchtip:latest
    container_name: zynksec-glitchtip-worker
    restart: unless-stopped
    profiles:
      - obs
    command: ["./bin/run-celery-with-beat.sh"]
    depends_on:
      glitchtip-postgres:
        condition: service_healthy
      glitchtip-redis:
        condition: service_healthy
      glitchtip-web:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${GLITCHTIP_POSTGRES_USER:-glitchtip}:${GLITCHTIP_POSTGRES_PASSWORD:-changeme-local-only}@glitchtip-postgres:5432/${GLITCHTIP_POSTGRES_DB:-glitchtip}
      REDIS_URL: redis://glitchtip-redis:6379/0
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-please-generate-a-32-byte-base64-value}
      EMAIL_URL: consolemail://
      DEFAULT_FROM_EMAIL: glitchtip@localhost
      CELERY_WORKER_CONCURRENCY: "1"
    networks:
      - zynksec-core
    mem_limit: 512m
    memswap_limit: 512m
    # No healthcheck — Celery workers don't expose an HTTP probe.
    # Container health is implied by the process staying alive + logs.

networks:
  zynksec-core:
    name: zynksec-core
  zynksec-scan:
    name: zynksec-scan
  zynksec-targets:
    name: zynksec-targets
    # No bridge to host or internet — docs/04 §0.6 + §0.19 risk table.
    internal: true

volumes:
  postgres-data:
    name: zynksec-postgres-data
  glitchtip-pg-data:
    # Only created when `--profile obs` is active; survives a profile-off
    # restart so captured events persist across dev sessions.
    name: zynksec-glitchtip-pg-data
