[alembic]
# %(here)s resolves to the directory containing this INI file, so
# `alembic -c apps/api/alembic.ini ...` works from any cwd (repo root,
# the api container's /app, CI runners) without needing --raiseerr or
# env-var gymnastics.
script_location = %(here)s/alembic

# DSN is NOT set here — env.py reads DATABASE_URL from the process env.
# Leave this placeholder so stray tooling that inspects the INI does not crash.
sqlalchemy.url = postgresql+psycopg://placeholder

# Revisions go under alembic/versions/
[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
