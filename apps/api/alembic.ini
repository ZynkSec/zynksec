[alembic]
# Script location is relative to this file; invoke alembic from apps/api
# or pass `-c apps/api/alembic.ini` from the repo root.
script_location = alembic

# DSN is NOT set here — env.py reads DATABASE_URL from the process env.
# Leave this placeholder so stray tooling that inspects the INI does not crash.
sqlalchemy.url = postgresql+psycopg://placeholder

# Revisions go under alembic/versions/
[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
