name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    name: lint-python (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv + Python
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"
          python-version: "3.12.7"
          enable-cache: true
      - name: Resolve workspace
        run: uv sync
      - name: Ruff lint
        run: uv run ruff check .
      - name: Black --check
        run: uv run black --check .

  lint-js:
    name: lint-js (prettier + eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.2
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: pnpm
      - name: Install JS deps
        run: pnpm install --frozen-lockfile
      - name: Prettier --check
        run: pnpm run format:check
      - name: ESLint
        run: pnpm run lint

  secrets:
    name: secrets (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Install gitleaks CLI
        env:
          GITLEAKS_VERSION: "8.21.2"
        run: |
          set -euo pipefail
          curl -sSLo /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan for secrets
        run: |
          gitleaks detect \
            --source . \
            --redact \
            --verbose \
            --exit-code 1 \
            --no-banner

  deps:
    name: deps (trivy fs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install trivy CLI
        run: |
          set -euo pipefail
          # Install trivy from the official Aqua Security APT repository.
          # This is the trivy-team-recommended install path for Debian/Ubuntu
          # (https://trivy.dev/docs/getting-started/installation/) and avoids
          # the GitHub-release-asset 404s we hit with both direct curl
          # downloads and the contrib/install.sh installer.
          #
          # Trade-off: this installs whatever trivy version is current in the
          # Aqua APT repo, not a pinned patch version. For a security scanner
          # this is the right call — vuln signatures and matchers are updated
          # frequently and pinning the binary defeats half the point.
          sudo install -d /etc/apt/keyrings -m 0755
          curl -fsSL https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo gpg --dearmor -o /etc/apt/keyrings/trivy.gpg
          echo "deb [signed-by=/etc/apt/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y trivy
          trivy --version
      - name: Trivy filesystem scan
        run: |
          set -euo pipefail
          # Skip tests/fixtures — purpose-built vulnerable test material
          # for our own scanners.  The OSV-Scanner Sprint 3 plant
          # (lodash@4.17.20, CVE-2021-23337) is deliberately vulnerable
          # so the scanner has something to find; trivy's repo-level
          # scan was catching it as a real finding.  Same pattern as the
          # gitfixture Dockerfile's build-time secret construction
          # (Sprint 1 vs. GitHub secret scanning) — anything under
          # tests/fixtures/ is purpose-built and shouldn't trip
          # production-security CI.
          trivy fs \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --format table \
            --skip-dirs tests/fixtures \
            .

  build-images:
    name: build-images (api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build API image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: false
          tags: zynksec/api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration-tests:
    name: integration-tests (api + worker + zap + juice-shop)
    runs-on: ubuntu-latest
    # ZAP cold boot + full baseline scan against juice-shop runs ~5 min
    # on GitHub's standard runners; 20 min leaves headroom for
    # image pulls, compose up, and the non-ZAP job steps.
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv + Python
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"
          python-version: "3.12.7"
          enable-cache: true
      - name: Resolve workspace
        run: uv sync
      - name: Prepare .env
        # docker compose's env_file needs the file on disk.
        run: cp .env.example .env
      - name: Start Compose stack (+ lab profile for juice-shop + DVWA)
        # ``docker-compose.ci.yml`` lowers each ZAP from the canonical
        # 6 GiB cgroup to 4 GiB so the multi-instance Sprint-3 stack
        # fits the free-tier ubuntu-latest runner's ~7 GiB RAM ceiling
        # without OOM.  Production / dev-laptop-with-headroom keep the
        # unmodified 6 GiB caps.  See the file header for context.
        #
        # NOTE: no ``--wait``.  The Compose version on GitHub-hosted
        # runners has a quirk where ``up --wait`` returns exit code 1
        # when a one-shot service (here ``dvwa-init``, ``restart: no``)
        # exits 0 — Compose's "still running?" check sees a stopped
        # container and reports failure even though the operation
        # succeeded.  The explicit health loop below covers the
        # original intent (block until every dependent is up and
        # init has run); the ``docker compose wait dvwa-init`` step
        # after it captures init's exit code so we still fail loudly
        # if the schema setup actually breaks.
        run: |
          set -euo pipefail
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.ci.yml \
            -f target-lab/compose-targets.yml \
            -f tests/integration/docker-compose.test.yml \
            --profile dev --profile lab \
            up -d postgres redis worker1 worker2 code-worker api mailpit \
            zap1 zap2 juice-shop dvwa-db dvwa dvwa-init gitfixture
      - name: Wait for ZAP + juice-shop + DVWA to report healthy
        run: |
          set -euo pipefail
          for svc in zynksec-zap1 zynksec-zap2 zynksec-juice-shop zynksec-dvwa; do
            echo "waiting for $svc..."
            for _ in $(seq 1 90); do
              status=$(docker inspect --format='{{.State.Health.Status}}' "$svc" 2>/dev/null || echo unknown)
              if [ "$status" = "healthy" ]; then
                echo "$svc healthy"
                break
              fi
              sleep 2
            done
            test "$status" = "healthy" || { echo "$svc never became healthy ($status)"; exit 1; }
          done
      - name: Verify dvwa-init schema-setup completed cleanly
        # ``docker compose wait`` only finds currently-running
        # containers, and dvwa-init has typically exited 0 by the
        # time we get here (its two-step CSRF + create_db flow runs
        # in ~2 s once dvwa is healthy, while the ``up`` step blocks
        # for ~30-60 s waiting on the ZAPs).  ``docker inspect`` reads
        # the exit code from the still-present (but stopped)
        # container — works whether it's running or already exited.
        # Init's bash logs (``[dvwa-init] schema created`` on
        # success) come via ``docker logs`` if it failed.
        run: |
          set -euo pipefail
          for _ in $(seq 1 30); do
            state=$(docker inspect --format='{{.State.Status}}' zynksec-dvwa-init 2>/dev/null || echo missing)
            if [ "$state" = "exited" ]; then break; fi
            echo "dvwa-init state=$state, waiting..."
            sleep 2
          done
          test "$state" = "exited" || { echo "dvwa-init never exited (state=$state)"; exit 1; }
          exit_code=$(docker inspect --format='{{.State.ExitCode}}' zynksec-dvwa-init)
          if [ "$exit_code" != "0" ]; then
            echo "dvwa-init failed with exit code $exit_code"
            docker logs zynksec-dvwa-init
            exit 1
          fi
          echo "dvwa-init completed cleanly"
      - name: Apply Alembic migrations
        run: |
          set -euo pipefail
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.ci.yml \
            -f target-lab/compose-targets.yml \
            -f tests/integration/docker-compose.test.yml \
            exec -T api \
            alembic -c apps/api/alembic.ini upgrade head
      - name: Run integration tests
        env:
          # The workflow manages compose lifecycle; the pytest fixture
          # skips its own up/down when this is set.
          ZYNKSEC_TEST_KEEP_STACK: "1"
        run: uv run pytest tests/integration/ -v --timeout=600
      - name: Dump Compose logs on failure
        if: failure()
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.ci.yml \
            -f target-lab/compose-targets.yml \
            -f tests/integration/docker-compose.test.yml \
            logs --no-color
      - name: Tear down Compose stack
        if: always()
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.ci.yml \
            -f target-lab/compose-targets.yml \
            -f tests/integration/docker-compose.test.yml \
            down -v
