name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    name: lint-python (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv + Python
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.11.7"
          python-version: "3.12.7"
          enable-cache: true
      - name: Resolve workspace
        run: uv sync
      - name: Ruff lint
        run: uv run ruff check .
      - name: Black --check
        run: uv run black --check .

  lint-js:
    name: lint-js (prettier + eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm
      - name: Install JS deps
        run: pnpm install --frozen-lockfile
      - name: Prettier --check
        run: pnpm run format:check
      - name: ESLint
        run: pnpm run lint

  secrets:
    name: secrets (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Gitleaks scans the full diff when PR, and the full history
          # on main pushes — fetch-depth 0 so it can see everything.
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deps:
    name: deps (trivy fs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: table

  build-images:
    name: build-images (api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: false
          tags: zynksec/api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
