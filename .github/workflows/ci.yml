name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    name: lint-python (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv + Python
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.11.7"
          python-version: "3.12.7"
          enable-cache: true
      - name: Resolve workspace
        run: uv sync
      - name: Ruff lint
        run: uv run ruff check .
      - name: Black --check
        run: uv run black --check .

  lint-js:
    name: lint-js (prettier + eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm
      - name: Install JS deps
        run: pnpm install --frozen-lockfile
      - name: Prettier --check
        run: pnpm run format:check
      - name: ESLint
        run: pnpm run lint

  secrets:
    name: secrets (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Install gitleaks CLI
        env:
          GITLEAKS_VERSION: "8.21.2"
        run: |
          set -euo pipefail
          curl -sSLo /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan for secrets
        run: |
          gitleaks detect \
            --source . \
            --redact \
            --verbose \
            --exit-code 1 \
            --no-banner

  deps:
    name: deps (trivy fs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install trivy CLI
        run: |
          set -euo pipefail
          # Install trivy from the official Aqua Security APT repository.
          # This is the trivy-team-recommended install path for Debian/Ubuntu
          # (https://trivy.dev/docs/getting-started/installation/) and avoids
          # the GitHub-release-asset 404s we hit with both direct curl
          # downloads and the contrib/install.sh installer.
          #
          # Trade-off: this installs whatever trivy version is current in the
          # Aqua APT repo, not a pinned patch version. For a security scanner
          # this is the right call — vuln signatures and matchers are updated
          # frequently and pinning the binary defeats half the point.
          sudo install -d /etc/apt/keyrings -m 0755
          curl -fsSL https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo gpg --dearmor -o /etc/apt/keyrings/trivy.gpg
          echo "deb [signed-by=/etc/apt/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y trivy
          trivy --version
      - name: Trivy filesystem scan
        run: |
          set -euo pipefail
          trivy fs \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --format table \
            .

  build-images:
    name: build-images (api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: false
          tags: zynksec/api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration-tests:
    name: integration-tests (api + worker + zap + juice-shop)
    runs-on: ubuntu-latest
    # ZAP cold boot + full baseline scan against juice-shop runs ~5 min
    # on GitHub's standard runners; 20 min leaves headroom for
    # image pulls, compose up, and the non-ZAP job steps.
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install uv + Python
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.11.7"
          python-version: "3.12.7"
          enable-cache: true
      - name: Resolve workspace
        run: uv sync
      - name: Prepare .env
        # docker compose's env_file needs the file on disk.
        run: cp .env.example .env
      - name: Start Compose stack (+ lab profile for juice-shop)
        run: |
          set -euo pipefail
          docker compose \
            -f docker-compose.yml \
            -f target-lab/compose-targets.yml \
            -f tests/integration/docker-compose.test.yml \
            --profile dev --profile lab \
            up -d postgres redis worker api mailpit zap juice-shop
      - name: Wait for ZAP + juice-shop to report healthy
        run: |
          set -euo pipefail
          for svc in zynksec-zap zynksec-juice-shop; do
            echo "waiting for $svc..."
            for _ in $(seq 1 90); do
              status=$(docker inspect --format='{{.State.Health.Status}}' "$svc" 2>/dev/null || echo unknown)
              if [ "$status" = "healthy" ]; then
                echo "$svc healthy"
                break
              fi
              sleep 2
            done
            test "$status" = "healthy" || { echo "$svc never became healthy ($status)"; exit 1; }
          done
      - name: Apply Alembic migrations
        run: |
          set -euo pipefail
          docker compose \
            -f docker-compose.yml \
            -f target-lab/compose-targets.yml \
            -f tests/integration/docker-compose.test.yml \
            exec -T api \
            alembic -c apps/api/alembic.ini upgrade head
      - name: Run integration tests
        env:
          # The workflow manages compose lifecycle; the pytest fixture
          # skips its own up/down when this is set.
          ZYNKSEC_TEST_KEEP_STACK: "1"
        run: uv run pytest tests/integration/ -v --timeout=600
      - name: Dump Compose logs on failure
        if: failure()
        run: |
          docker compose \
            -f docker-compose.yml \
            -f target-lab/compose-targets.yml \
            -f tests/integration/docker-compose.test.yml \
            logs --no-color
      - name: Tear down Compose stack
        if: always()
        run: |
          docker compose \
            -f docker-compose.yml \
            -f target-lab/compose-targets.yml \
            -f tests/integration/docker-compose.test.yml \
            down -v
