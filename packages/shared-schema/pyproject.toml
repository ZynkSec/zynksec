[project]
name = "zynksec-schema"
version = "0.0.0"
description = "Zynksec canonical schemas — the Finding contract every scanner and consumer agrees on."
readme = "README.md"
requires-python = "==3.12.*"
license = { text = "AGPL-3.0-or-later" }
authors = [{ name = "Zynksec Maintainers" }]
dependencies = [
  "pydantic>=2.9,<3",
]

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zynksec_schema"]
