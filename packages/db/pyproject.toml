[project]
name = "zynksec-db"
version = "0.0.0"
description = "Zynksec persistence layer — SQLAlchemy 2.x models and repositories shared by apps/api and apps/worker."
readme = "README.md"
requires-python = "==3.12.*"
license = { text = "AGPL-3.0-or-later" }
authors = [{ name = "Zynksec Maintainers" }]
dependencies = [
  "sqlalchemy>=2.0,<3",
  "psycopg[binary]>=3.2,<4",
]

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zynksec_db"]
