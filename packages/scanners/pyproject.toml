[project]
name = "zynksec-scanners"
version = "0.0.0"
description = "Scanner plugin contract and engine implementations (ZAP, Nuclei, ...) for Zynksec."
readme = "README.md"
requires-python = "==3.12.*"
license = { text = "AGPL-3.0-or-later" }
authors = [{ name = "Zynksec Maintainers" }]
dependencies = [
  "httpx>=0.27,<0.29",
  # structlog so scanner-internal log lines auto-merge the worker's
  # bound contextvars (correlation_id, celery_task_id).  No change to
  # the ScannerPlugin public contract; additive observability only.
  "structlog>=24,<25",
  "zynksec-schema",
]

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zynksec_scanners"]

[tool.uv.sources]
zynksec-schema = { workspace = true }
