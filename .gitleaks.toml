# Gitleaks configuration — extends the default ruleset with allow-list
# entries so the fixture-plant directory used by the Phase 3 Sprint 1
# integration tests doesn't trip CI's repo-wide secrets scan.
#
# IMPORTANT: this allow-list applies to gitleaks runs that read
# ``.gitleaks.toml`` from the repo root (CI's secrets job).  It does
# NOT apply when gitleaks runs against a cloned copy of the fixture
# repo from inside the test suite — that scan operates on the
# cloned source tree (at ``/tmp/zynksec-scans/...``), which carries
# the planted files but no config file.  The test's gitleaks scan
# therefore uses default rules (no allow-list) and still finds the
# plants, exactly as a real-world scan would.

[extend]
useDefault = true

[[allowlists]]
description = "Phase 3 Sprint 1 vulnerable-repo fixture plants"
# Path matches use Go's regexp syntax against POSIX paths.
paths = [
  '''tests/fixtures/vulnerable-repo-src/.*''',
]
