# Copy to docker-compose.override.yml (gitignored) to customise your
# local stack without touching the canonical docker-compose.yml.
# Uncomment the stanzas you want.
#
# Phase 2 Sprint 3: the dev memory-relief stanza below lowers each
# ZAP cgroup from 6 GiB to 4 GiB so the two-ZAP fan-out fits on a
# Docker VM around 12 GiB.  Production / CI keep the unmodified
# 6 GiB / -Xmx3500m caps from docker-compose.yml — 4 GiB is enough
# for PASSIVE and SAFE_ACTIVE scans against juice-shop but is the
# documented floor (-Xmx2500m + ~500 MiB non-heap), so AGGRESSIVE
# under load should run on a host that can give each ZAP the full
# 6 GiB.  See docs/architecture/zap-resource-tuning.md for the math.
#
# `command:` is a list, so compose REPLACES rather than merges it —
# every override below repeats the full ZAP CLI from docker-compose.yml
# with only ``-Xmx`` changed, so no flags drift on copy.

# services:
#   # ----- Dev memory relief: 4 GiB / -Xmx2500m per ZAP (uncomment to enable) -----
#   zap1:
#     mem_limit: 4g
#     memswap_limit: 4g
#     command:
#       - zap.sh
#       - -Xmx2500m
#       - -daemon
#       - -host
#       - 0.0.0.0
#       - -port
#       - "8090"
#       - -config
#       - api.addrs.addr.name=.*
#       - -config
#       - api.addrs.addr.regex=true
#       - -config
#       - api.key=${ZAP_API_KEY}
#
